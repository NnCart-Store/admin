<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 p-4">

    <h1 class="text-xl font-bold mb-4">🚀 NnCart Quick Admin</h1>

    <div id="reader" class="rounded-xl overflow-hidden mb-4 bg-black"></div>
    <button onclick="window.startScan()" class="w-full bg-blue-600 text-white p-3 rounded-lg mb-6 font-bold">📷 SCAN BARCODE</button>

    <div class="bg-white p-4 rounded-xl shadow-lg space-y-2">
        <input id="barcode" placeholder="Barcode" class="w-full p-2 border rounded font-mono text-blue-600" readonly>
        <input id="pname" placeholder="Product Name" class="w-full p-2 border rounded">
        <div class="flex gap-2">
            <input id="price" placeholder="Price ₹" type="number" class="w-1/2 p-2 border rounded">
            <input id="stock" placeholder="Stock" type="number" value="1" class="w-1/2 p-2 border rounded">
        </div>
        <input id="image" placeholder="Image URL" class="w-full p-2 border rounded text-xs">
        <input id="category" placeholder="Category" class="w-full p-2 border rounded text-xs">
        
        <button id="saveBtn" onclick="window.saveAll()" class="w-full bg-green-600 text-white p-4 rounded-xl font-black mt-4 shadow-lg">✅ SAVE TO SHEET & FIREBASE</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCH2di4fAKw8vA80Cv8BMobi-v1p0I",
        authDomain: "nncart.firebaseapp.com",
        projectId: "nncart",
        storageBucket: "nncart.firebasestorage.app",
        messagingSenderId: "662993037031",
        appId: "1:662993037031:web:893e379fe374cb74d26442"
    };

    const db = getFirestore(initializeApp(firebaseConfig));
    const SHEET_URL = "https://script.google.com/macros/s/AKfycbxsZI2CZma2Op53gSJwki7gC9Zs5qZtnpp1_4N3TeerW1s3KO3F7CWGxmO5WXLZs2Dj/exec";

    let scanner = new Html5Qrcode("reader");

    window.startScan = () => {
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, async (txt) => {
            scanner.stop();
            document.getElementById("barcode").value = txt;
            document.getElementById("pname").value = "🔎 AI Fetching...";

            // 🌍 AI Auto-Fill Logic (Shoes/Branded ke liye optimized)
            try {
                const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${txt}.json`);
                const data = await res.json();
                if (data.status === 1) {
                    document.getElementById("pname").value = data.product.product_name || "Branded Item";
                    document.getElementById("image").value = data.product.image_url || "";
                    document.getElementById("category").value = data.product.categories?.split(',')[0] || "General";
                } else {
                    document.getElementById("pname").value = "Reliance Branded Shoe";
                    document.getElementById("category").value = "Footwear";
                }
            } catch (e) { document.getElementById("pname").value = "Manual Entry"; }
        });
    };

    window.saveAll = async () => {
        const btn = document.getElementById("saveBtn");
        btn.disabled = true; btn.innerText = "Saving...";

        const data = {
            Barcode: document.getElementById("barcode").value,
            Name: document.getElementById("pname").value,
            Price: document.getElementById("price").value || "0",
            Image: document.getElementById("image").value || "",
            Category: document.getElementById("category").value || "",
            Stock: document.getElementById("stock").value || "1"
        };

        try {
            // 1. Firebase Save
            await addDoc(collection(db, "products"), data);
            // 2. Google Sheet Save
            fetch(`${SHEET_URL}?action=addProduct&${new URLSearchParams(data)}`, { mode: "no-cors" });
            
            alert("✅ Dono jagah save ho gaya!");
            location.reload();
        } catch (e) { alert("Error!"); btn.disabled = false; }
    };
</script>
</body>
</html>
