<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NnCart PRO Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="manifest" href="manifest.json">
</head>

<body class="bg-gray-100 p-4">

<div class="flex justify-between items-center mb-3">
    <h1 class="text-xl font-bold">🔥 NnCart PRO Admin</h1>
    <button onclick="startScanner()" class="bg-blue-500 text-white p-3 rounded-full">📷</button>
</div>

<div class="grid grid-cols-4 gap-2 mb-3">
    <div class="bg-white p-2 text-center shadow text-xs">Orders<br><b id="ordersCount">0</b></div>
    <div class="bg-white p-2 text-center shadow text-xs">Revenue<br><b id="revenue">₹0</b></div>
    <div class="bg-white p-2 text-center shadow text-xs">Pending<br><b id="pending">0</b></div>
    <div class="bg-white p-2 text-center shadow text-xs">Products<br><b id="productsCount">0</b></div>
</div>

<input id="search" placeholder="Search Orders..." class="border p-2 w-full mb-3">

<div class="bg-white p-3 rounded shadow mb-4">
    <h2 class="font-bold mb-2">📦 Add / Scan Product</h2>
    <input id="barcode" placeholder="Barcode" class="border p-2 w-full mb-1">
    <input id="pname" placeholder="Product Name" class="border p-2 w-full mb-1">
    <input id="price" placeholder="Price" class="border p-2 w-full mb-1">
    <input id="image" placeholder="Image URL" class="border p-2 w-full mb-1">
    <input id="category" placeholder="Category" class="border p-2 w-full mb-1">
    <input id="stock" placeholder="Stock" class="border p-2 w-full mb-1">
    <input id="color" placeholder="Color" class="border p-2 w-full mb-1">
    <input id="size" placeholder="Size" class="border p-2 w-full mb-1">

    <div class="flex gap-2 mt-2">
        <button onclick="startScanner()" class="bg-blue-500 text-white p-2 w-full">Scan</button>
        <button id="saveBtn" onclick="saveProduct()" class="bg-green-500 text-white p-2 w-full">Save</button>
    </div>

    <div id="scanner" style="width:100%; min-height:300px; margin-top:10px;"></div>
</div>

<h2 class="font-bold">Products</h2>
<div id="products"></div>

<h2 class="font-bold mt-4">Orders</h2>
<div id="orders"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCH2di4fAKw8vA80Cv8BMobi-v1p0I", 
        authDomain: "nncart.firebaseapp.com",
        projectId: "nncart",
        storageBucket: "nncart.firebasestorage.app",
        messagingSenderId: "662993037031",
        appId: "1:662993037031:web:893e379fe374cb74d26442"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const INVENTORY_URL = "https://script.google.com/macros/s/AKfycbybYKpOvkeF4cYA9OkmJ6X7qQnt0SA4TwhdCLxU4q9WvB4brIZpWbYr95eqXzNEmkK1/exec";

    let html5QrCode = null;

    // 🔥 SMART SCANNER (Auto-Fetch Enabled)
    window.startScanner = async () => {
        const scannerDiv = document.getElementById("scanner");
        scannerDiv.innerHTML = '<div id="qr-reader" style="width: 100%;"></div>';
        
        if (!html5QrCode) {
            html5QrCode = new Html5Qrcode("qr-reader");
        }

        try {
            await html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: 250 },
                async (decodedText) => {
                    document.getElementById("barcode").value = decodedText;
                    
                    // --- SMART FETCH START ---
                    document.getElementById("pname").value = "Searching net...";
                    try {
                        const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${decodedText}.json`);
                        const data = await res.json();
                        if (data.status === 1) {
                            document.getElementById("pname").value = data.product.product_name || "";
                            document.getElementById("image").value = data.product.image_url || "";
                            alert("✅ Net se data mil gaya!");
                        } else {
                            document.getElementById("pname").value = "";
                            alert("⚠️ Scan OK, par Net par detail nahi mili.");
                        }
                    } catch (e) {
                        document.getElementById("pname").value = "";
                    }
                    // --- SMART FETCH END ---

                    html5QrCode.stop();
                    scannerDiv.innerHTML = "";
                }
            );
        } catch (err) {
            alert("❌ Camera Error: " + err);
        }
    };

    // 🔥 FIXED SAVE PRODUCT LOGIC
    window.saveProduct = async () => {
        const barcodeVal = document.getElementById("barcode").value;
        const nameVal = document.getElementById("pname").value;

        if (!barcodeVal || !nameVal) { 
            alert("❌ Barcode aur Name zaroori hai!"); 
            return; 
        }

        const btn = document.getElementById("saveBtn");
        btn.disabled = true;
        btn.innerText = "Saving...";
        
        const product = {
            Barcode: barcodeVal,
            Name: nameVal,
            Price: document.getElementById("price").value || "0",
            Image: document.getElementById("image").value || "",
            Category: document.getElementById("category").value || "",
            Stock: document.getElementById("stock").value || "0",
            Color: document.getElementById("color").value || "",
            Size: document.getElementById("size").value || ""
        };

        try {
            // 1. Firebase Save
            await addDoc(collection(db, "products"), product);

            // 2. Google Sheet Save
            await fetch(INVENTORY_URL + "?action=addProduct", {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(product)
            });

            alert("✅ Firebase aur Google Sheet dono mein save ho gaya!");
            location.reload(); 
        } catch (e) {
            alert("❌ Error: " + e.message);
            btn.disabled = false;
            btn.innerText = "Save";
        }
    };

    window.loadProducts = async () => {
        try {
            const snap = await getDocs(collection(db, "products"));
            document.getElementById("productsCount").innerText = snap.size;
        } catch (e) { console.log("Load error"); }
    };
    
    loadProducts();
</script>
</body>
</html>
